name: validation

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and validation dependencies
        run: python -m pip install -e ".[dev]"
      - name: Compile Python sources
        run: python -m compileall -q src tests main.py
      - name: Run tests with JUnit evidence
        run: pytest -q --junitxml="reports/junit-${{ matrix.python-version }}.xml"
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit-${{ matrix.python-version }}
          path: reports/junit-${{ matrix.python-version }}.xml
          if-no-files-found: error
      - name: Run Ruff
        if: matrix.python-version == '3.11'
        run: ruff check .
      - name: Run Black validation
        if: matrix.python-version == '3.11'
        run: black --check .
      - name: Run Mypy
        if: matrix.python-version == '3.11'
        run: mypy .
