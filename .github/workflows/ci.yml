name: validation

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package and validation dependencies
        run: python -m pip install -e ".[dev]"
      - name: Compile Python sources
        run: python -m compileall -q src tests main.py
      - name: Run tests
        run: pytest -q
      - name: Run Ruff
        run: ruff check .
      - name: Run Black validation
        run: black --check .
      - name: Run Mypy
        run: mypy .
